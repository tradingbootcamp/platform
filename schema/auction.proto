syntax = "proto3";
package websocket_api;

import "google/protobuf/timestamp.proto";

message Auction {
  int64 id = 1;
  string name = 2;
  string description = 3;
  int64 owner_id = 4;

  int64 transaction_id = 5;
  google.protobuf.Timestamp transaction_timestamp = 6;

  oneof status {
    Open open = 7;
    Closed closed = 8;
  }
  optional string image_url = 9;
  optional double bin_price = 10;  // Optional bin price for the auction
  // Labeled owner once settled. 0 = no owner picked (split auction with no chosen owner).
  int64 buyer_id = 11;
  // All contributors and their paid amounts. Empty until settled.
  repeated AuctionBuyer buyers = 12;

  message Open {}

  message Closed {
    double settle_price = 1;
  }
}

message AuctionBuyer {
  int64 account_id = 1;
  double amount = 2;
}
